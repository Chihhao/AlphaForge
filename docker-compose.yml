version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphaforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Map the local database file to persist data if any
      - ./backend/stock_data.db:/app/stock_data.db
    environment:
      - TZ=Asia/Taipei

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative path - browser will call via HTTPS through reverse proxy
        NEXT_PUBLIC_API_URL: /alphaforge/api
    container_name: alphaforge-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - TZ=Asia/Taipei
      - NEXT_PUBLIC_API_URL=/alphaforge/api
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      - backend
