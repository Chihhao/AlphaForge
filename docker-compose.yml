version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphaforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Map the local database file to persist data if any
      - ./backend/stock_data.db:/app/stock_data.db
    environment:
      - TZ=Asia/Taipei

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the local IP so Next.js bakes it during build time
        NEXT_PUBLIC_API_URL: http://10.0.4.3:8000
    container_name: alphaforge-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - TZ=Asia/Taipei
      - NEXT_PUBLIC_API_URL=http://10.0.4.3:8000
    depends_on:
      - backend
